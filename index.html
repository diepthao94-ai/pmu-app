<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diệp Thảo PMU - Official V12</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, remove, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        window.FirebaseSDK = { initializeApp, getDatabase, ref, push, onValue, update, remove, query, limitToLast };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700&family=Inter:wght@300;400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020202; color: #f2f2f2; overflow-x: hidden; }
        .font-luxury { font-family: 'Playfair Display', serif; }
        .bg-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .text-neon { color: #ff69b4; text-shadow: 0 0 15px rgba(255, 105, 180, 0.6); }
        .animate-up { animation: fadeInUp 0.4s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input, select, textarea { background: rgba(255,255,255,0.05) !important; color: white !important; border: 1px solid rgba(255,255,255,0.1) !important; border-radius: 12px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { initializeApp, getDatabase, ref, push, onValue, update, remove, query, limitToLast } = window.FirebaseSDK;
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCse8qtVm5M-20JL0HQ5BRQ3fN-z2zduuc",
            authDomain: "khoquanlydt.firebaseapp.com",
            databaseURL: "https://khoquanlydt-default-rtdb.firebaseio.com",
            projectId: "khoquanlydt",
            storageBucket: "khoquanlydt.firebasestorage.app",
            messagingSenderId: "192350251058",
            appId: "1:192350251058:web:07a29c26c42dad95b9742b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const WEB_LOCK = "tingting";
        const ADMIN_PASS = "5252";

        function App() {
            const [isUnlocked, setIsUnlocked] = useState(sessionStorage.getItem('webUnlocked') === 'true');
            const [activeTab, setActiveTab] = useState('home');
            const [customers, setCustomers] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({ name: '', service: 'Phun Môi', date: new Date().toISOString().split('T')[0], price: '', note: '' });
            const [editingId, setEditingId] = useState(null);

            useEffect(() => {
                if (!isUnlocked) return;
                const custRef = ref(db, 'customers');
                onValue(custRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const list = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                        setCustomers(list.reverse());
                    } else { setCustomers([]); }
                });
            }, [isUnlocked]);

            const handleSave = (e) => {
                e.preventDefault();
                const custRef = ref(db, 'customers');
                if (editingId) {
                    update(ref(db, `customers/${editingId}`), formData);
                } else {
                    push(custRef, formData);
                }
                setIsModalOpen(false);
                setEditingId(null);
                setFormData({ name: '', service: 'Phun Môi', date: new Date().toISOString().split('T')[0], price: '', note: '' });
            };

            const handleDelete = (id) => {
                if (prompt("Mã xoá:") === ADMIN_PASS) {
                    remove(ref(db, `customers/${id}`));
                }
            };

            useEffect(() => { if(window.lucide) window.lucide.createIcons(); });

            if (!isUnlocked) return (
                <div className="h-screen bg-[#020202] flex flex-col items-center justify-center p-12 text-center">
                    <h1 className="text-3xl font-black text-white mb-12 tracking-[0.4em]">DIEPTHAO PMU</h1>
                    <input type="password" autoFocus placeholder="MẬT MÃ..." className="w-full max-w-xs p-5 text-center tracking-[1em] font-bold outline-none"
                        onChange={(e) => {if(e.target.value===WEB_LOCK){setIsUnlocked(true);sessionStorage.setItem('webUnlocked','true');}}} />
                </div>
            );

            return (
                <div className="min-h-screen pb-24 pt-8 px-6 max-w-md mx-auto">
                    <header className="flex justify-between items-center mb-10">
                        <div>
                            <h1 className="text-2xl font-black text-white">Diệp Thảo <span className="text-neon font-luxury italic">PMU</span></h1>
                            <p className="text-[8px] tracking-[0.3em] opacity-30 uppercase font-bold">Quản lý hồ sơ chuyên nghiệp</p>
                        </div>
                    </header>

                    <div className="bg-card rounded-2xl flex items-center px-4 py-4 mb-6">
                        <i data-lucide="search" size="16" className="opacity-20 mr-3"></i>
                        <input type="text" placeholder="TÌM TÊN KHÁCH..." className="bg-transparent text-[10px] outline-none w-full font-bold" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                    </div>

                    <div className="space-y-4">
                        {customers.filter(c => c.name.toLowerCase().includes(searchTerm.toLowerCase())).map(c => (
                            <div key={c.id} className="bg-card rounded-[2rem] p-5 border border-white/5 flex justify-between items-center animate-up">
                                <div>
                                    <h3 className="text-[13px] font-black uppercase">{c.name}</h3>
                                    <p className="text-[9px] text-pink-500 font-bold uppercase">{c.service} - {c.date}</p>
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={() => {setEditingId(c.id); setFormData(c); setIsModalOpen(true);}} className="opacity-30"><i data-lucide="edit-3" size="16"></i></button>
                                    <button onClick={() => handleDelete(c.id)} className="text-red-900/50"><i data-lucide="trash-2" size="16"></i></button>
                                </div>
                            </div>
                        ))}
                    </div>

                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[60%] bg-black/80 border border-white/10 flex justify-center items-center p-4 z-50 backdrop-blur-xl rounded-full">
                        <button onClick={() => { setEditingId(null); setIsModalOpen(true); }} className="bg-pink-600 p-4 rounded-full -mt-14 border-4 border-[#020202] shadow-2xl active:scale-90"><i data-lucide="plus" color="white" size="28"></i></button>
                    </nav>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-6 backdrop-blur-sm">
                            <div className="bg-[#080808] w-full max-w-md rounded-[3rem] p-8 border border-white/10 relative animate-up">
                                <button onClick={() => setIsModalOpen(false)} className="absolute top-8 right-8 opacity-20"><i data-lucide="x" size="24"></i></button>
                                <form onSubmit={handleSave} className="space-y-5 pt-4">
                                    <h2 className="text-center font-luxury italic text-xl text-neon">Hồ sơ khách</h2>
                                    <input required className="w-full p-4 text-[11px] font-bold uppercase outline-none" placeholder="TÊN KHÁCH..." value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                    <select className="w-full p-4 text-[11px] font-bold outline-none uppercase" value={formData.service} onChange={e => setFormData({...formData, service: e.target.value})}>
                                        <option value="Phun Môi">Phun Môi</option>
                                        <option value="Phun Mày">Phun Mày</option>
                                        <option value="Khác">Khác</option>
                                    </select>
                                    <input type="date" className="w-full p-4 text-[11px] font-bold outline-none" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} />
                                    <textarea className="w-full p-4 text-[11px] h-24 outline-none" placeholder="GHI CHÚ..." value={formData.note} onChange={e => setFormData({...formData, note: e.target.value})} />
                                    <button className="w-full bg-pink-600 text-white py-5 rounded-[2.5rem] text-[11px] font-black uppercase tracking-widest">LƯU HỒ SƠ</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
