<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diệp Thảo PMU - History Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700&family=Inter:wght@300;400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020202; color: #f2f2f2; overflow-x: hidden; }
        .font-luxury { font-family: 'Playfair Display', serif; }
        .bg-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .text-neon { color: #ff69b4; text-shadow: 0 0 15px rgba(255, 105, 180, 0.6); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-up { animation: fadeInUp 0.4s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input, select, textarea { background: rgba(255,255,255,0.05) !important; color: white !important; border: 1px solid rgba(255,255,255,0.1) !important; border-radius: 12px; }
        .gate-title { letter-spacing: 0.5em; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
    </style>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        window.FirebaseSDK = { initializeApp, getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, limit };
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { initializeApp, getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, limit } = window.FirebaseSDK;
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCagpAIdIzUWidSC7liNvQVFHr-hpZZEbQ",
            authDomain: "quanlydiepthao.firebaseapp.com",
            projectId: "quanlydiepthao",
            storageBucket: "quanlydiepthao.firebasestorage.app",
            messagingSenderId: "2061214359",
            appId: "1:2061214359:web:b845ac95d41b284aa1ffd2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const appId = 'diep-thao-pmu-app';
        const ADMIN_PASS = "5252";
        const WEB_LOCK = "tingting";
        const ADMIN_EMAIL = "diepthao94@gmail.com";

        function App() {
            const [isUnlocked, setIsUnlocked] = useState(sessionStorage.getItem('webUnlocked') === 'true');
            const [activeTab, setActiveTab] = useState('home');
            const [isAdminMode, setIsAdminMode] = useState(false);
            const [showTotal, setShowTotal] = useState(false);
            const [customers, setCustomers] = useState([]);
            const [logs, setLogs] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isHistoryOpen, setIsHistoryOpen] = useState(false);
            const [editingCustomer, setEditingCustomer] = useState(null);
            const [myEmail, setMyEmail] = useState(localStorage.getItem('myEmail') || '');
            const [staffList, setStaffList] = useState(localStorage.getItem('staffList') || ADMIN_EMAIL);

            useEffect(() => {
                if (!isUnlocked) return;
                const custRef = collection(db, 'artifacts', appId, 'public', 'data', 'customers');
                const logRef = collection(db, 'artifacts', appId, 'public', 'data', 'logs');
                
                const unsubCust = onSnapshot(query(custRef, orderBy('date', 'desc')), (snap) => {
                    setCustomers(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                
                const unsubLog = onSnapshot(query(logRef, orderBy('time', 'desc'), limit(50)), (snap) => {
                    setLogs(snap.docs.map(d => d.data()));
                });

                return () => { unsubCust(); unsubLog(); };
            }, [isUnlocked]);

            const addLog = async (action) => {
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'logs'), {
                        user: myEmail || "Ẩn danh",
                        action: action,
                        time: new Date().toLocaleString('vi-VN')
                    });
                } catch(e) {}
            };

            const checkPermission = () => {
                const currentEmail = (myEmail || "").trim().toLowerCase();
                if (currentEmail === ADMIN_EMAIL.toLowerCase()) return true;
                const authorizedList = staffList.split(',').map(e => e.trim().toLowerCase());
                return authorizedList.includes(currentEmail) && currentEmail !== "";
            };

            const [formData, setFormData] = useState({
                name: '', service: 'Phun chân mày shading', date: new Date().toISOString().split('T')[0],
                price: '', note: ''
            });

            const handleSave = async (e) => {
                e.preventDefault();
                if (!checkPermission()) { alert("Bạn không có quyền lưu!"); return; }
                const data = { ...formData, price: Number(formData.price) || 0 };
                try {
                    if (editingCustomer) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', editingCustomer.id), data);
                        addLog(`Sửa: ${data.name}`);
                    } else {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'customers'), data);
                        addLog(`Thêm: ${data.name}`);
                    }
                    setIsModalOpen(false);
                    setEditingCustomer(null);
                    setFormData({ name: '', service: 'Phun chân mày shading', date: new Date().toISOString().split('T')[0], price: '', note: '' });
                } catch (err) { alert("Lỗi!"); }
            };

            const handleDelete = async (id, name) => {
                if (prompt("Nhập mã 5252 để xoá:") === ADMIN_PASS) {
                    if (confirm(`Xoá hồ sơ: ${name}?`)) {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', id));
                        addLog(`Xoá: ${name}`);
                    }
                }
            };

            const reminders = useMemo(() => {
                const today = new Date();
                const getDiff = (dateStr) => Math.floor((today - new Date(dateStr)) / (1000 * 60 * 60 * 24));
                return customers.filter(c => {
                    const diff = getDiff(c.date);
                    const s = c.service.toLowerCase();
                    if ((s.includes("mày") || s.includes("hút")) && diff >= 30) return true;
                    if (s.includes("môi") && diff >= 60) return true;
                    if (s.includes("laser") && diff >= 15) return true;
                    return false;
                });
            }, [customers]);

            const revenue = useMemo(() => {
                const now = new Date();
                return customers.filter(c => new Date(c.date).getMonth() === now.getMonth())
                                .reduce((s, c) => s + (c.price || 0), 0);
            }, [customers]);

            useEffect(() => { if(window.lucide) window.lucide.createIcons(); });

            if (!isUnlocked) return (
                <div className="h-screen bg-[#020202] flex flex-col items-center justify-center p-12">
                    <h1 className="text-3xl font-black text-white gate-title mb-12 animate-up uppercase tracking-[0.4em]">DIEPTHAO PMU</h1>
                    <input type="password" autoFocus placeholder="MẬT MÃ..." 
                        className="w-full max-w-xs p-5 text-center tracking-[1em] font-bold text-lg outline-none"
                        onChange={(e) => {if(e.target.value===WEB_LOCK){setIsUnlocked(true);sessionStorage.setItem('webUnlocked','true');}}} />
                </div>
            );

            return (
                <div className="min-h-screen pb-24 pt-8 px-6 max-w-md mx-auto">
                    <header className="flex justify-between items-start mb-10">
                        <div className="animate-up">
                            <div className="flex items-baseline gap-2">
                                <h1 className="text-2xl font-black text-white">Diệp Thảo</h1>
                                <span className="font-luxury italic text-2xl text-neon">PMU</span>
                            </div>
                            <p className="text-[7px] tracking-[0.55em] text-white/30 mt-1.5 uppercase border-t border-white/5 pt-1.5 font-medium">Phun Xăm Chuyên Nghiệp</p>
                        </div>
                        <div className="flex flex-col items-end gap-2 animate-up">
                            <button onClick={() => {if(prompt("Mã Admin:")===ADMIN_PASS) {setShowTotal(!showTotal); setIsAdminMode(true);} else alert("Sai!")}} 
                                className="bg-white/5 px-3 py-1.5 rounded-full border border-white/10 text-[9px] font-black uppercase">
                                Total: <span className={showTotal ? "text-neon" : "text-white/20"}>{showTotal ? revenue.toLocaleString() : '***'}</span>
                            </button>
                            <button onClick={() => setIsHistoryOpen(true)} className="p-2 bg-white/5 rounded-full border border-white/10 hover:bg-white/10 transition-colors">
                                <i data-lucide="history" size="14" className="text-pink-500"></i>
                            </button>
                        </div>
                    </header>

                    {activeTab === 'home' && (
                        <div className="animate-up">
                            <div className="bg-card rounded-2xl flex items-center px-4 py-4 mb-6">
                                <i data-lucide="search" size="14" className="opacity-20 mr-3"></i>
                                <input type="text" placeholder="TÌM KIẾM KHÁCH HÀNG..." className="bg-transparent text-[10px] outline-none w-full font-bold uppercase tracking-widest" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                            </div>
                            <div className="space-y-4">
                                {customers.filter(c => c.name.toLowerCase().includes(searchTerm.toLowerCase())).map(c => (
                                    <div key={c.id} className="bg-card rounded-3xl p-5 border border-white/5 flex justify-between items-center">
                                        <div className="flex-1 min-w-0">
                                            <h3 className="text-[13px] font-black uppercase text-white/90 truncate">{c.name}</h3>
                                            <p className="text-[8px] font-bold text-pink-500/80 uppercase mt-1 italic">{c.service}</p>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <div className="text-[8px] opacity-20 font-bold">{c.date}</div>
                                            <button onClick={() => {setEditingCustomer(c); setFormData(c); setIsModalOpen(true);}} className="text-white/20 hover:text-neon"><i data-lucide="edit-3" size="14"></i></button>
                                            <button onClick={() => handleDelete(c.id, c.name)} className="text-red-900/40 hover:text-red-500"><i data-lucide="trash-2" size="14"></i></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {activeTab === 'reminder' && (
                        <div className="animate-up space-y-4">
                            <h2 className="text-[10px] font-black uppercase text-pink-500 tracking-[0.3em] mb-2">Nhắc lịch tái khám</h2>
                            {reminders.map(c => (
                                <div key={c.id} className="bg-card rounded-3xl p-5 border-l-2 border-pink-500 flex justify-between items-center">
                                    <div>
                                        <div className="flex items-center gap-2">
                                            <span className="text-sm">{c.service.toLowerCase().includes("môi") ? "💋" : (c.service.toLowerCase().includes("laser") ? "✨" : "🖋️")}</span>
                                            <h3 className="text-[12px] font-black uppercase">{c.name}</h3>
                                        </div>
                                        <p className="text-[8px] opacity-50 uppercase mt-1">Dịch vụ từ: {c.date}</p>
                                    </div>
                                    <span className="text-[9px] font-black text-pink-500 uppercase tracking-tighter">Đã đủ ngày!</span>
                                </div>
                            ))}
                        </div>
                    )}

                    {activeTab === 'settings' && (
                        <div className="animate-up space-y-6">
                            <div className="bg-card p-6 rounded-3xl border border-white/5">
                                <h2 className="text-[10px] font-black uppercase text-pink-500 mb-6 tracking-[0.2em]">Hệ thống</h2>
                                <input type="email" className="w-full p-4 text-[10px] font-bold outline-none mb-4" value={myEmail} 
                                    onChange={e => {setMyEmail(e.target.value); localStorage.setItem('myEmail', e.target.value);}} placeholder="Email của bạn..." />
                                <textarea className={`w-full p-4 text-[10px] font-bold outline-none h-28 ${!isAdminMode ? 'opacity-20' : ''}`} 
                                    value={staffList} onChange={(e) => isAdminMode && setStaffList(e.target.value)} 
                                    placeholder="Danh sách nhân viên (Admin)..." />
                            </div>
                        </div>
                    )}

                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[85%] bg-black/60 border border-white/10 flex justify-around items-center p-4 z-50 backdrop-blur-3xl rounded-full shadow-2xl">
                        <button onClick={() => setActiveTab('home')} className={activeTab === 'home' ? 'text-neon' : 'opacity-20'}><i data-lucide="users" size="20"></i></button>
                        <button onClick={() => setActiveTab('reminder')} className={activeTab === 'reminder' ? 'text-neon' : 'opacity-20'}><i data-lucide="calendar-clock" size="20"></i></button>
                        <button onClick={() => { setEditingCustomer(null); setIsModalOpen(true); }} className="bg-gradient-to-tr from-pink-600 to-rose-400 p-4 rounded-full -mt-14 border-4 border-[#020202] shadow-2xl active:scale-90"><i data-lucide="plus" color="white" size="24"></i></button>
                        <button onClick={() => setActiveTab('settings')} className={activeTab === 'settings' ? 'text-neon' : 'opacity-20'}><i data-lucide="shield-check" size="20"></i></button>
                    </nav>

                    {/* MODAL LỊCH SỬ CHỈNH SỬA */}
                    {isHistoryOpen && (
                        <div className="fixed inset-0 bg-black/98 z-[200] flex items-center justify-center p-6">
                            <div className="bg-[#080808] w-full max-w-md rounded-[3rem] p-8 border border-white/10 relative animate-up max-h-[85vh] overflow-hidden flex flex-col">
                                <button onClick={() => setIsHistoryOpen(false)} className="absolute top-8 right-8 opacity-20"><i data-lucide="x" size="24"></i></button>
                                <h2 className="text-center font-luxury italic text-xl text-neon mb-8">Lịch sử chỉnh sửa</h2>
                                <div className="overflow-y-auto no-scrollbar space-y-4 pr-2">
                                    {logs.map((log, i) => (
                                        <div key={i} className="bg-white/5 p-4 rounded-2xl border-l border-pink-500/30">
                                            <div className="flex justify-between items-start mb-1">
                                                <span className="text-[10px] font-black text-white/90 uppercase tracking-widest">{log.action}</span>
                                                <span className="text-[8px] opacity-30">{log.time}</span>
                                            </div>
                                            <p className="text-[9px] text-pink-500/60 font-medium">Người thực hiện: {log.user}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL THÊM/SỬA KHÁCH */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/98 z-[100] flex items-center justify-center p-6">
                            <div className="bg-[#080808] w-full max-w-md rounded-[3rem] p-8 border border-white/10 relative animate-up max-h-[90vh] overflow-y-auto no-scrollbar shadow-2xl">
                                <button onClick={() => setIsModalOpen(false)} className="absolute top-8 right-8 opacity-20"><i data-lucide="x" size="24"></i></button>
                                <form onSubmit={handleSave} className="space-y-5 pt-4">
                                    <h2 className="text-center font-luxury italic text-xl text-neon mb-4">Hồ sơ khách hàng</h2>
                                    <input required className="w-full p-4.5 rounded-2xl text-[11px] font-bold uppercase outline-none" placeholder="TÊN KHÁCH HÀNG..." value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                    <select className="w-full p-4.5 rounded-2xl text-[11px] font-bold outline-none uppercase" value={formData.service} onChange={e => setFormData({...formData, service: e.target.value})}>
                                        <option value="Phun chân mày shading">Phun chân mày shading</option>
                                        <option value="Phun chân mày Sợi">Phun chân mày Sợi</option>
                                        <option value="Phun Môi">Phun Môi</option>
                                        <option value="Hút dung dịch">Hút dung dịch</option>
                                        <option value="Xoá Laser">Xoá Laser</option>
                                    </select>
                                    <div className="grid grid-cols-2 gap-3">
                                        <input type="date" className="p-4.5 rounded-2xl text-[11px] font-bold uppercase outline-none" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} />
                                        <input type="number" className="p-4.5 rounded-2xl text-[11px] font-bold text-pink-400 outline-none" placeholder="GIÁ TIỀN..." value={formData.price} onChange={e => setFormData({...formData, price: e.target.value})} />
                                    </div>
                                    <textarea className="w-full p-4.5 rounded-2xl text-[11px] h-24 text-white/40 outline-none placeholder:italic" placeholder="GHI CHÚ CÔNG THỨC..." value={formData.note} onChange={e => setFormData({...formData, note: e.target.value})} />
                                    <button className="w-full bg-pink-600 text-white py-5 rounded-[2.5rem] text-[10px] font-black uppercase tracking-[0.4em] shadow-2xl active:scale-[0.98]">LƯU DỮ LIỆU</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
