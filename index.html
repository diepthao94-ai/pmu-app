<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diệp Thảo PMU - Official V25</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700&family=Inter:wght@300;400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020202; color: #f2f2f2; overflow-x: hidden; }
        .font-luxury { font-family: 'Playfair Display', serif; }
        .bg-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .text-neon { color: #ff69b4; text-shadow: 0 0 15px rgba(255, 105, 180, 0.6); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-up { animation: fadeInUp 0.4s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input, select, textarea { background: rgba(255,255,255,0.05) !important; color: white !important; border: 1px solid rgba(255,255,255,0.1) !important; border-radius: 12px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // CẤU HÌNH GỐC - ĐÃ KIỂM TRA ĐỊA CHỈ
        const firebaseConfig = {
            apiKey: "AIzaSyCse8qtVm5M-20JL0HQ5BRQ3fN-z2zduuc",
            authDomain: "khoquanlydt.firebaseapp.com",
            databaseURL: "https://khoquanlydt-default-rtdb.firebaseio.com", // Đảm bảo đúng link trong Firebase Console của bạn
            projectId: "khoquanlydt"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const { useState, useEffect, useMemo } = React;
        const ADMIN_PASS = "5252";
        const WEB_LOCK = "tingting";

        function App() {
            const [isUnlocked, setIsUnlocked] = useState(sessionStorage.getItem('webUnlocked') === 'true');
            const [activeTab, setActiveTab] = useState('home');
            const [customers, setCustomers] = useState([]);
            const [logs, setLogs] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isHistoryOpen, setIsHistoryOpen] = useState(false);
            const [editingCustomer, setEditingCustomer] = useState(null);
            const [status, setStatus] = useState('Đang kết nối...');

            const [formData, setFormData] = useState({
                name: '', service: 'Phun chân mày shading', date: new Date().toISOString().split('T')[0],
                price: '', note: ''
            });

            // LẮY DỮ LIỆU THỰC TẾ
            useEffect(() => {
                if (!isUnlocked) return;

                const custRef = db.ref('customers');
                
                // Lắng nghe dữ liệu
                custRef.on('value', (snapshot) => {
                    const val = snapshot.val();
                    if (val) {
                        const list = Object.keys(val).map(key => ({ id: key, ...val[key] }));
                        setCustomers(list.sort((a, b) => b.date.localeCompare(a.date)));
                        setStatus('');
                    } else {
                        setCustomers([]);
                        setStatus('Chưa có dữ liệu khách');
                    }
                }, (error) => {
                    setStatus('Lỗi kết nối: ' + error.message);
                });

                db.ref('logs').limitToLast(20).on('value', (snap) => {
                    if (snap.val()) setLogs(Object.values(snap.val()).reverse());
                });

                return () => custRef.off();
            }, [isUnlocked]);

            const handleSave = (e) => {
                e.preventDefault();
                const data = { ...formData, price: Number(formData.price) || 0 };
                
                if (editingCustomer) {
                    db.ref('customers/' + editingCustomer.id).update(data).then(() => {
                        db.ref('logs').push({ action: 'Sửa: ' + data.name, time: new Date().toLocaleString('vi-VN') });
                        closeModal();
                    });
                } else {
                    db.ref('customers').push(data).then(() => {
                        db.ref('logs').push({ action: 'Thêm: ' + data.name, time: new Date().toLocaleString('vi-VN') });
                        closeModal();
                    }).catch(err => alert("Lỗi lưu: " + err.message));
                }
            };

            const closeModal = () => {
                setIsModalOpen(false);
                setEditingCustomer(null);
                setFormData({ name: '', service: 'Phun chân mày shading', date: new Date().toISOString().split('T')[0], price: '', note: '' });
            };

            const handleDelete = (id, name) => {
                if (prompt("Mã xoá Admin:") === ADMIN_PASS) {
                    db.ref('customers/' + id).remove();
                }
            };

            const revenue = useMemo(() => {
                const now = new Date();
                return customers.filter(c => new Date(c.date).getMonth() === now.getMonth())
                                .reduce((s, c) => s + (Number(c.price) || 0), 0);
            }, [customers]);

            useEffect(() => { if(window.lucide) window.lucide.createIcons(); });

            if (!isUnlocked) return (
                <div className="h-screen bg-[#020202] flex flex-col items-center justify-center p-12">
                    <h1 className="text-3xl font-black text-white mb-12 uppercase tracking-[0.4em]">DIEPTHAO PMU</h1>
                    <input type="password" autoFocus placeholder="MẬT MÃ..." 
                        className="w-full max-w-xs p-5 text-center tracking-[1em] font-bold text-lg outline-none"
                        onChange={(e) => {if(e.target.value===WEB_LOCK){setIsUnlocked(true);sessionStorage.setItem('webUnlocked','true');}}} />
                </div>
            );

            return (
                <div className="min-h-screen pb-24 pt-8 px-6 max-w-md mx-auto">
                    <header className="flex justify-between items-start mb-10 animate-up">
                        <div>
                            <div className="flex items-baseline gap-2">
                                <h1 className="text-2xl font-black text-white">Diệp Thảo</h1>
                                <span className="font-luxury italic text-2xl text-neon">PMU</span>
                            </div>
                            <p className="text-[7px] tracking-[0.55em] text-white/30 mt-1.5 uppercase border-t border-white/5 pt-1.5 font-medium">Phun Xăm Chuyên Nghiệp</p>
                        </div>
                        <div className="flex flex-col items-end gap-3">
                            <button onClick={() => {if(prompt("Admin:")===ADMIN_PASS) alert("Doanh thu tháng: " + revenue.toLocaleString() + " VNĐ")}} 
                                className="bg-white/5 px-3 py-1.5 rounded-full border border-white/10 text-[9px] font-black uppercase">
                                THỐNG KÊ
                            </button>
                            <button onClick={() => setIsHistoryOpen(true)} className="p-2.5 bg-white/5 rounded-full border border-white/10 active:scale-90">
                                <i data-lucide="history" size="14" className="text-pink-500"></i>
                            </button>
                        </div>
                    </header>

                    {activeTab === 'home' && (
                        <div className="animate-up">
                            <div className="bg-card rounded-2xl flex items-center px-4 py-4 mb-6">
                                <i data-lucide="search" size="14" className="opacity-20 mr-3"></i>
                                <input type="text" placeholder="TÌM TÊN KHÁCH..." className="bg-transparent text-[10px] outline-none w-full font-bold uppercase tracking-widest" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                            </div>
                            
                            {status && <p className="text-center py-10 text-[9px] opacity-40 uppercase tracking-widest">{status}</p>}

                            <div className="space-y-4">
                                {customers.filter(c => c.name.toLowerCase().includes(searchTerm.toLowerCase())).map(c => (
                                    <div key={c.id} className="bg-card rounded-[2rem] p-5 border border-white/5 flex justify-between items-center" onClick={() => {setEditingCustomer(c); setFormData(c); setIsModalOpen(true);}}>
                                        <div className="flex-1 min-w-0">
                                            <h3 className="text-[13px] font-black uppercase text-white/90 truncate">{c.name}
