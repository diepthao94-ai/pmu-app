<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diệp Thảo PMU - Ultra Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700&family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020202; color: #f2f2f2; -webkit-tap-highlight-color: transparent; }
        .text-neon { color: #ff69b4; text-shadow: 0 0 10px rgba(255, 105, 180, 0.5); }
        .bg-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input, select, textarea { background: #111 !important; color: white !important; border: 1px solid #222 !important; border-radius: 10px; padding: 12px; }
        .gate-title { letter-spacing: 0.4em; }
    </style>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        window.FirebaseSDK = { initializeApp, getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc };
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { initializeApp, getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc } = window.FirebaseSDK;
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCagpAIdIzUWidSC7liNvQVFHr-hpZZEbQ",
            authDomain: "quanlydiepthao.firebaseapp.com",
            projectId: "quanlydiepthao",
            storageBucket: "quanlydiepthao.firebasestorage.app",
            appId: "1:2061214359:web:b845ac95d41b284aa1ffd2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const appId = 'diep-thao-pmu-app';
        const ADMIN_PASS = "5252";
        const WEB_LOCK = "tingting";
        const ADMIN_EMAIL = "diepthao94@gmail.com";

        function App() {
            const [isUnlocked, setIsUnlocked] = useState(sessionStorage.getItem('webUnlocked') === 'true');
            const [activeTab, setActiveTab] = useState('home');
            const [isAdminMode, setIsAdminMode] = useState(false);
            const [customers, setCustomers] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingCustomer, setEditingCustomer] = useState(null);
            const [viewingImage, setViewingImage] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            
            const [myEmail, setMyEmail] = useState(localStorage.getItem('myEmail') || '');
            const [staffList, setStaffList] = useState(localStorage.getItem('staffList') || ADMIN_EMAIL);

            const [formData, setFormData] = useState({
                name: '', service: 'Phun chân mày shading', date: new Date().toISOString().split('T')[0],
                price: '', note: '', image: ''
            });

            useEffect(() => {
                if (!isUnlocked) return;
                const custRef = collection(db, 'artifacts', appId, 'public', 'data', 'customers');
                return onSnapshot(query(custRef, orderBy('date', 'desc')), (snap) => {
                    setCustomers(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
            }, [isUnlocked]);

            const checkPermission = () => {
                const mail = (myEmail || "").trim().toLowerCase();
                if (mail === ADMIN_EMAIL.toLowerCase()) return true;
                if (staffList.toLowerCase().includes(mail) && mail !== "") return true;
                alert("Bạn chưa được cấp quyền lưu hồ sơ.");
                return false;
            };

            const resizeImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const size = 300; // Cực nhẹ
                            canvas.width = size;
                            canvas.height = (img.height * size) / img.width;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            resolve(canvas.toDataURL('image/jpeg', 0.6));
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            };

            const handleImage = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    try {
                        const compressed = await resizeImage(file);
                        setFormData(prev => ({...prev, image: compressed}));
                    } catch (err) { alert("Lỗi xử lý ảnh, vui lòng thử lại."); }
                }
            };

            const handleSave = async (e) => {
                e.preventDefault();
                if (!checkPermission() || isSaving) return;
                setIsSaving(true);

                try {
                    const data = { ...formData, price: Number(formData.price) || 0 };
                    const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'customers');
                    if (editingCustomer) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', editingCustomer.id), data);
                    } else {
                        await addDoc(colRef, data);
                    }
                    setIsModalOpen(false);
                    setEditingCustomer(null);
                    setFormData({ name: '', service: 'Phun chân mày shading', date: new Date().toISOString().split('T')[0], price: '', note: '', image: '' });
                } catch (err) { alert("Không thể lưu. Hãy kiểm tra mạng."); }
                setIsSaving(false);
            };

            if (!isUnlocked) return (
                <div className="h-screen bg-black flex flex-col items-center justify-center p-10">
                    <h1 className="text-2xl font-black text-white gate-title mb-8 uppercase">DIEPTHAO PMU</h1>
                    <input type="password" placeholder="MẬT MÃ..." className="w-full max-w-xs text-center tracking-widest" 
                        onChange={(e) => e.target.value === WEB_LOCK && setIsUnlocked(true)} />
                </div>
            );

            return (
                <div className="min-h-screen pb-24 pt-6 px-5 max-w-md mx-auto">
                    <header className="flex justify-between items-center mb-8">
                        <div>
                            <h1 className="text-xl font-black text-white">Diệp Thảo <span className="text-neon font-luxury italic">PMU</span></h1>
                        </div>
                        <button onClick={() => prompt("Admin:") === ADMIN_PASS && setIsAdminMode(true)} className="opacity-20 text-[10px]">ADMIN</button>
                    </header>

                    {activeTab === 'home' ? (
                        <div className="space-y-4">
                            <input type="text" placeholder="TÌM TÊN KHÁCH..." className="w-full text-[11px] font-bold" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                            {customers.filter(c => c.name.toLowerCase().includes(searchTerm.toLowerCase())).map(c => (
                                <div key={c.id} className="bg-card rounded-2xl p-4 flex items-center gap-4">
                                    <div className="w-16 h-16 bg-black rounded-lg overflow-hidden shrink-0" onClick={() => c.image && setViewingImage(c.image)}>
                                        {c.image && <img src={c.image} className="w-full h-full object-cover" />}
                                    </div>
                                    <div className="flex-1 min-w-0">
                                        <h3 className="text-sm font-bold uppercase truncate">{c.name}</h3>
                                        <p className="text-[10px] text-pink-500 truncate">{c.service}</p>
                                    </div>
                                    <button onClick={() => {setEditingCustomer(c); setFormData(c); setIsModalOpen(true);}} className="p-2 opacity-30"><i data-lucide="edit-2" size="14"></i></button>
                                </div>
                            ))}
                        </div>
                    ) : (
                        <div className="bg-card p-5 rounded-2xl space-y-4">
                            <p className="text-[10px] font-bold text-pink-500 uppercase">Thiết lập quyền</p>
                            <input type="email" placeholder="Email của bạn..." className="w-full text-xs" value={myEmail} onChange={e => {setMyEmail(e.target.value); localStorage.setItem('myEmail', e.target.value);}} />
                            {isAdminMode && <textarea className="w-full text-xs h-32" value={staffList} onChange={e => {setStaffList(e.target.value); localStorage.setItem('staffList', e.target.value);}} placeholder="Danh sách email nhân viên..." />}
                        </div>
                    )}

                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[70%] bg-[#111] border border-white/10 flex justify-around p-3 rounded-full shadow-2xl">
                        <button onClick={() => setActiveTab('home')} className={activeTab === 'home' ? 'text-pink-500' : 'opacity-20'}><i data-lucide="home" size="20"></i></button>
                        <button onClick={() => {setEditingCustomer(null); setIsModalOpen(true);}} className="bg-pink-600 p-3 rounded-full -mt-10"><i data-lucide="plus" color="white" size="24"></i></button>
                        <button onClick={() => setActiveTab('settings')} className={activeTab === 'settings' ? 'text-pink-500' : 'opacity-20'}><i data-lucide="user" size="20"></i></button>
                    </nav>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black z-[100] flex items-center justify-center p-6 overflow-y-auto">
                            <div className="bg-[#080808] w-full max-w-sm rounded-3xl p-6 border border-white/10">
                                <form onSubmit={handleSave} className="space-y-4">
                                    <div className="flex justify-center">
                                        <label className="w-20 h-20 bg-white/5 rounded-full border border-dashed border-white/20 flex items-center justify-center overflow-hidden">
                                            {formData.image ? <img src={formData.image} className="w-full h-full object-cover" /> : <i data-lucide="camera" className="opacity-20"></i>}
                                            <input type="file" accept="image/*" className="hidden" onChange={handleImage} />
                                        </label>
                                    </div>
                                    <input required placeholder="TÊN KHÁCH..." className="w-full" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                    <select className="w-full" value={formData.service} onChange={e => setFormData({...formData, service: e.target.value})}>
                                        <option value="Phun chân mày shading">Phun chân mày shading</option>
                                        <option value="Phun Môi">Phun Môi</option>
                                        <option value="Điêu khắc">Điêu khắc</option>
                                        <option value="Xoá Laser">Xoá Laser</option>
                                    </select>
                                    <div className="flex gap-2">
                                        <input type="date" className="w-1/2" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} />
                                        <input type="number" placeholder="GIÁ..." className="w-1/2" value={formData.price} onChange={e => setFormData({...formData, price: e.target.value})} />
                                    </div>
                                    <textarea placeholder="GHI CHÚ..." className="w-full h-20" value={formData.note} onChange={e => setFormData({...formData, note: e.target.value})} />
                                    <div className="flex gap-2">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="w-1/2 p-3 opacity-50 uppercase text-[10px] font-bold">Hủy</button>
                                        <button disabled={isSaving} className="w-1/2 bg-pink-600 p-3 rounded-xl uppercase text-[10px] font-bold">{isSaving ? 'Đang lưu...' : 'Lưu hồ sơ'}</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {viewingImage && (
                        <div className="fixed inset-0 bg-black/95 z-[200] flex items-center justify-center p-4" onClick={() => setViewingImage(null)}>
                            <img src={viewingImage} className="max-w-full max-h-[80vh] rounded-2xl" />
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => window.lucide && window.lucide.createIcons(), 500);
    </script>
</body>
</html>
