<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diệp Thảo PMU - V17 USA Server</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700&family=Inter:wght@300;400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020202; color: #f2f2f2; }
        .font-luxury { font-family: 'Playfair Display', serif; }
        .bg-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .text-neon { color: #ff69b4; text-shadow: 0 0 15px rgba(255, 105, 180, 0.6); }
        input, select, textarea { background: rgba(255,255,255,0.05) !important; color: white !important; border: 1px solid rgba(255,255,255,0.1) !important; border-radius: 12px; }
        .animate-up { animation: fadeInUp 0.4s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        window.FirebaseSDK = { initializeApp, getDatabase, ref, push, onValue, remove, update };
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { initializeApp, getDatabase, ref, push, onValue, remove, update } = window.FirebaseSDK;
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCse8qtVm5M-20JL0HQ5BRQ3fN-z2zduuc",
            authDomain: "khoquanlydt.firebaseapp.com",
            databaseURL: "https://khoquanlydt-default-rtdb.firebaseio.com",
            projectId: "khoquanlydt",
            appId: "1:192350251058:web:07a29c26c42dad95b9742b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        function App() {
            const [isUnlocked, setIsUnlocked] = useState(sessionStorage.getItem('webUnlocked') === 'true');
            const [customers, setCustomers] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({ name: '', service: 'Phun Môi', date: new Date().toISOString().split('T')[0], note: '' });

            useEffect(() => {
                if (!isUnlocked) return;
                // Kết nối thẳng tới nhánh 'customers'
                const custRef = ref(db, 'customers');
                const unsubscribe = onValue(custRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const list = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                        setCustomers(list.sort((a,b) => b.date.localeCompare(a.date)).reverse());
                    } else {
                        setCustomers([]);
                    }
                }, (err) => {
                    console.error("Lỗi kết nối:", err);
                });
                return () => unsubscribe();
            }, [isUnlocked]);

            const handleSave = (e) => {
                e.preventDefault();
                push(ref(db, 'customers'), formData)
                    .then(() => {
                        setIsModalOpen(false);
                        setFormData({ name: '', service: 'Phun Môi', date: new Date().toISOString().split('T')[0], note: '' });
                        alert("Đã lưu thành công!");
                    })
                    .catch(err => alert("Lỗi lưu: " + err.message));
            };

            useEffect(() => { if(window.lucide) window.lucide.createIcons(); });

            if (!isUnlocked) return (
                <div className="h-screen bg-[#020202] flex flex-col items-center justify-center p-12">
                    <h1 className="text-2xl font-black text-white mb-8 tracking-[0.3em] uppercase">DIEPTHAO PMU</h1>
                    <input type="password" autoFocus placeholder="MẬT MÃ..." className="w-full max-w-xs p-4 text-center outline-none border-b border-pink-500 bg-transparent text-white"
                        onChange={(e) => {if(e.target.value==='tingting'){setIsUnlocked(true);sessionStorage.setItem('webUnlocked','true');}}} />
                </div>
            );

            return (
                <div className="min-h-screen pb-24 pt-8 px-6 max-w-md mx-auto animate-up">
                    <header className="mb-10">
                        <h1 className="text-xl font-black text-white uppercase flex items-baseline gap-2">
                            Hồ sơ <span className="text-neon font-luxury italic text-2xl">KHÁCH</span>
                        </h1>
                    </header>

                    <div className="bg-card rounded-2xl flex items-center px-4 py-4 mb-8">
                        <i data-lucide="search" size="14" className="opacity-20 mr-3"></i>
                        <input type="text" placeholder="TÌM TÊN KHÁCH..." className="bg-transparent text-[10px] outline-none w-full font-bold uppercase text-white" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                    </div>

                    <div className="space-y-4">
                        {customers.filter(c => c.name.toLowerCase().includes(searchTerm.toLowerCase())).map(c => (
                            <div key={c.id} className="bg-card rounded-[2rem] p-5 border border-white/5 flex justify-between items-center">
                                <div className="flex-1">
                                    <h3 className="text-[13px] font-black uppercase text-white">{c.name}</h3>
                                    <p className="text-[9px] text-pink-500 font-bold uppercase italic">{c.service} - {c.date}</p>
                                </div>
                                <button onClick={() => {if(confirm("Xoá?")) remove(ref(db, `customers/${c.id}`))}} className="text-red-900/30 ml-4"><i data-lucide="trash-2" size="14"></i></button>
                            </div>
                        ))}
                    </div>

                    <button onClick={() => setIsModalOpen(true)} className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-pink-600 w-14 h-14 rounded-full flex items-center justify-center text-white shadow-2xl active:scale-90 z-50">
                        <i data-lucide="plus" size="28"></i>
                    </button>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-6 backdrop-blur-sm">
                            <div className="bg-[#080808] w-full max-w-md rounded-[2.5rem] p-8 border border-white/10 relative">
                                <button onClick={() => setIsModalOpen(false)} className="absolute top-6 right-6 opacity-20 text-white"><i data-lucide="x" size="24"></i></button>
                                <form onSubmit={handleSave} className="space-y-4">
                                    <h2 className="text-center font-luxury italic text-xl text-neon mb-4 font-bold">Lưu hồ sơ mới</h2>
                                    <input required className="w-full p-4 text-[11px] font-bold uppercase outline-none" placeholder="TÊN KHÁCH..." value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                    <select className="w-full p-4 text-[11px] font-bold outline-none uppercase" value={formData.service} onChange={e => setFormData({...formData, service: e.target.value})}>
                                        <option>Phun Môi</option>
                                        <option>Phun chân mày shading</option>
                                        <option>Phun chân mày Sợi</option>
                                        <option>Hút dung dịch/Laser</option>
                                    </select>
                                    <input type="date" className="w-full p-4 text-[11px] font-bold outline-none" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} />
                                    <textarea className="w-full p-4 text-[11px] h-20 outline-none" placeholder="GHI CHÚ..." value={formData.note} onChange={e => setFormData({...formData, note: e.target.value})} />
                                    <button className="w-full bg-pink-600 text-white py-4 rounded-full text-[11px] font-black uppercase tracking-widest">LƯU VÀO KHO</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
