<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diệp Thảo PMU - Pro V29</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700&family=Inter:wght@300;400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020202; color: #f2f2f2; margin: 0; }
        .font-luxury { font-family: 'Playfair Display', serif; }
        .bg-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .text-neon { color: #ff69b4; text-shadow: 0 0 15px rgba(255, 105, 180, 0.6); }
        .border-neon { border-bottom: 2px solid #ff69b4; box-shadow: 0 2px 10px rgba(255, 105, 180, 0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input, select, textarea { background: rgba(255,255,255,0.05) !important; color: white !important; border: 1px solid rgba(255,255,255,0.1) !important; border-radius: 12px; }
        .animate-up { animation: fadeInUp 0.4s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const WEB_LOCK = "tingting";
        const ADMIN_PASS = "5252";
        const ADMIN_EMAIL_DEFAULT = "diepthao94@gmail.com";

        function App() {
            const [isUnlocked, setIsUnlocked] = useState(sessionStorage.getItem('webUnlocked') === 'true');
            const [activeTab, setActiveTab] = useState('home');
            const [showTotal, setShowTotal] = useState(false);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isHistoryOpen, setIsHistoryOpen] = useState(false);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [editingCustomer, setEditingCustomer] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [isAdminMode, setIsAdminMode] = useState(false);

            const [customers, setCustomers] = useState(() => {
                const saved = localStorage.getItem('dt_cust_v29');
                return saved ? JSON.parse(saved) : [];
            });
            const [logs, setLogs] = useState(() => {
                const saved = localStorage.getItem('dt_logs_v29');
                return saved ? JSON.parse(saved) : [];
            });
            const [myEmail, setMyEmail] = useState(() => localStorage.getItem('dt_my_email_v29') || '');
            const [authorizedEmails, setAuthorizedEmails] = useState(() => {
                const saved = localStorage.getItem('dt_auth_emails_v29');
                return saved ? JSON.parse(saved) : [ADMIN_EMAIL_DEFAULT];
            });

            const [formData, setFormData] = useState({
                name: '', service: 'Phun chân mày shading', date: new Date().toISOString().split('T')[0],
                price: '', note: ''
            });

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
                localStorage.setItem('dt_cust_v29', JSON.stringify(customers));
                localStorage.setItem('dt_logs_v29', JSON.stringify(logs));
                localStorage.setItem('dt_my_email_v29', myEmail);
                localStorage.setItem('dt_auth_emails_v29', JSON.stringify(authorizedEmails));
            });

            const addLog = (action) => {
                const newLog = { user: myEmail || 'Ẩn danh', action, time: new Date().toLocaleString('vi-VN'), id: Date.now() };
                setLogs([newLog, ...logs].slice(0, 50));
            };

            const checkAccess = () => {
                const currentEmail = (myEmail || '').trim().toLowerCase();
                if (currentEmail === ADMIN_EMAIL_DEFAULT.toLowerCase()) return true;
                return authorizedEmails.map(e => e.trim().toLowerCase()).includes(currentEmail) && currentEmail !== '';
            };

            const handleSave = (e) => {
                e.preventDefault();
                if (!checkAccess()) { alert("Email của bạn chưa được cấp quyền!"); return; }
                const data = { ...formData, price: Number(formData.price) || 0 };
                if (editingCustomer) {
                    setCustomers(customers.map(c => c.id === editingCustomer.id ? { ...data, id: c.id } : c));
                    addLog(`Sửa: ${data.name}`);
                } else {
                    setCustomers([{ ...data, id: Date.now() }, ...customers]);
                    addLog(`Thêm: ${data.name}`);
                }
                setIsModalOpen(false);
                setEditingCustomer(null);
                setFormData({ name: '', service: 'Phun chân mày shading', date: new Date().toISOString().split('T')[0], price: '', note: '' });
            };

            const reminders = useMemo(() => {
                const today = new Date();
                return customers.filter(c => Math.floor((today - new Date(c.date)) / (1000 * 60 * 60 * 24)) >= 30);
            }, [customers]);

            const revenue = useMemo(() => {
                const now = new Date();
                return customers.filter(c => new Date(c.date).getMonth() === now.getMonth()).reduce((s, c) => s + (Number(c.price) || 0), 0);
            }, [customers]);

            if (!isUnlocked) return (
                <div className="h-screen bg-[#020202] flex flex-col items-center justify-center p-12 text-center animate-up">
                    <div className="mb-12">
                        <h1 className="text-3xl font-black text-white tracking-[0.3em] uppercase inline-block pb-2 border-neon">DIEP THAO PMU</h1>
                    </div>
                    <input type="password" placeholder="MẬT MÃ..." 
                        className="w-full max-w-xs p-5 text-center tracking-[0.8em] font-bold outline-none border-b border-pink-500 bg-transparent text-white"
                        onChange={(e) => {if(e.target.value===WEB_LOCK){setIsUnlocked(true);sessionStorage.setItem('webUnlocked','true');}}} />
                </div>
            );

            return (
                <div className="min-h-screen pb-24 pt-8 px-6 max-w-md mx-auto animate-up">
                    <header className="flex justify-between items-start mb-10 border-b border-white/5 pb-6">
                        <div>
                            <h1 className="text-2xl font-black text-white leading-none">Diệp Thảo <span className="font-luxury italic text-neon">PMU</span></h1>
                            <p className="text-[7px] tracking-[0.4em] text-white/30 mt-2 uppercase italic">Official Management</p>
                            <button onClick={() => {const e = prompt("Nhập Email của bạn:"); if(e) setMyEmail(e);}} className="text-[7px] font-bold text-pink-500/80 mt-1 uppercase italic border-t border-white/5 pt-1 block text-left truncate max-w-[120px]">
                                User: {myEmail || 'NHẬP EMAIL'}
                            </button>
                        </div>
                        <div className="flex flex-col items-end gap-2.5">
                            <button onClick={() => {if(prompt("Admin:")===ADMIN_PASS) setShowTotal(!showTotal)}} className="bg-white/5 px-3 py-1.5 rounded-full text-[9px] font-black uppercase border border-white/10 active:scale-95">
                                Doanh thu: <span className={showTotal ? "text-neon" : "text-white/10"}>{showTotal ? revenue.toLocaleString() : '***'} VNĐ</span>
                            </button>
                            <div className="flex gap-2">
                                <button onClick={() => setIsHistoryOpen(true)} className="p-2.5 bg-white/5 rounded-full border border-white/10 active:scale-90"><i data-lucide="history" size="14" className="text-white/60"></i></button>
                                <button onClick={() => setIsSettingsOpen(true)} className="p-2.5 bg-white/5 rounded-full border border-white/10 active:scale-90"><i data-lucide="shield-check" size="14" className="text-pink-500"></i></button>
                            </div>
                        </div>
                    </header>

                    {activeTab === 'home' ? (
                        <div>
                            <div className="bg-card rounded-2xl flex items-center px-4 py-4 mb-6">
                                <i data-lucide="search" size="14" className="opacity-20 mr-3 text-white"></i>
                                <input type="text" placeholder="TÌM TÊN KHÁCH HÀNG..." className="bg-transparent text-[10px] outline-none w-full font-bold uppercase text-white" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                            </div>
                            <div className="space-y-4">
                                {customers.filter(c => c.name.toLowerCase().includes(searchTerm.toLowerCase())).map(c => (
                                    <div key={c.id} className="bg-card rounded-[2rem] p-5 flex justify-between items-center border border-white/5 active:scale-98 transition-all" onClick={() => {setEditingCustomer(c); setFormData(c); setIsModalOpen(true);}}>
                                        <div className="flex-1 min-w-0">
                                            <h3 className="text-[13px] font-black uppercase text-white">{c.name}</h3>
                                            <p className="text-[8px] font-bold text-pink-500 mt-1 uppercase italic">{c.service}</p>
                                        </div>
                                        <div className="text-right flex items-center gap-3">
                                            <p className="text-[8px] opacity-20 font-bold uppercase text-white">{c.date}</p>
                                            <button onClick={(e) => {e.stopPropagation(); if(prompt("Mã Admin:")===ADMIN_PASS) { setCustomers(customers.filter(x => x.id !== c.id)); addLog(`Xoá: ${c.name}`); }}} className="text-red-900/40 hover:text-red-500"><i data-lucide="trash-2" size="14"></i></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className="animate-up space-y-4">
                            <h2 className="text-[10px] font-black uppercase text-pink-500 text-center tracking-[0.3em] mb-6">Lịch dặm hôm nay (30 ngày)</h2>
                            {reminders.map(c => (
                                <div key={c.id} className="bg-card rounded-3xl p-5 border-l-2 border-pink-500 flex justify-between items-center">
                                    <div><h3 className="text-[12px] font-black uppercase text-white">{c.name}</h3><p className="text-[8px] opacity-50 uppercase mt-1 text-white/70">{c.service} - Làm: {c.date}</p></div>
                                    <span className="text-[9px] font-black text-pink-500 uppercase">Cần dặm!</span>
                                </div>
                            ))}
                        </div>
                    )}

                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[75%] bg-black/80 border border-white/10 flex justify-around items-center p-4 z-50 backdrop-blur-xl rounded-full shadow-2xl">
                        <button onClick={() => setActiveTab('home')} className={activeTab === 'home' ? 'text-neon' : 'opacity-20 text-white'}><i data-lucide="users"></i></button>
                        <button onClick={() => {setEditingCustomer(null); setIsModalOpen(true)}} className="bg-pink-600 p-3 rounded-full -mt-12 shadow-xl active:scale-90 border-4 border-[#020202]"><i data-lucide="plus" color="white"></i></button>
                        <button onClick={() => setActiveTab('reminder')} className={activeTab === 'reminder' ? 'text-neon' : 'opacity-20 text-white'}><i data-lucide="calendar-clock"></i></button>
                    </nav>

                    {/* MODAL THÔNG TIN KHÁCH HÀNG (ĐÃ ĐỔI TÊN) */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/98 z-[100] flex items-center justify-center p-6 backdrop-blur-sm">
                            <div className="bg-[#080808] w-full max-w-md rounded-[3rem] p-8 border border-white/10 relative animate-up max-h-[90vh] overflow-y-auto no-scrollbar">
                                <button onClick={() => setIsModalOpen(false)} className="absolute top-8 right-8 opacity-30 text-white active:scale-90"><i data-lucide="x" size="24"></i></button>
                                <form onSubmit={handleSave} className="space-y-5 pt-4">
                                    <h2 className="text-center font-luxury italic text-xl text-neon mb-4 font-bold">Thông tin khách hàng</h2>
                                    <input required className="w-full p-4.5 rounded-2xl text-[11px] font-bold uppercase outline-none text-white bg-transparent" placeholder="TÊN KHÁCH..." value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                    <select className="w-full p-4.5 rounded-2xl text-[11px] font-bold outline-none uppercase text-white bg-transparent" value={formData.service} onChange={e => setFormData({...formData, service: e.target.value})}>
                                        <option value="Phun chân mày shading">Phun chân mày shading</option>
                                        <option value="Phun chân mày Sợi">Phun chân mày Sợi</option>
                                        <option value="Phun Môi">Phun Môi</option>
                                        <option value="Hút dung dịch">Hút dung dịch</option>
                                        <option value="Xoá Laser">Xoá Laser</option>
                                    </select>
                                    <div className="grid grid-cols-2 gap-3">
                                        <input type="date" className="p-4.5 rounded-2xl text-[11px] font-bold outline-none text-white bg-transparent" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} />
                                        <input type="number" className="p-4.5 rounded-2xl text-[11px] font-bold text-pink-400 outline-none bg-transparent" placeholder="GIÁ TIỀN..." value={formData.price} onChange={e => setFormData({...formData, price: e.target.value})} />
                                    </div>
                                    <textarea className="w-full p-4.5 rounded-2xl text-[11px] h-24 outline-none text-white bg-transparent" placeholder="GHI CHÚ MỰC / CÔNG THỨC..." value={formData.note} onChange={e => setFormData({...formData, note: e.target.value})} />
                                    <button className={`w-full ${checkAccess() ? 'bg-pink-600' : 'bg-white/10'} text-white py-5 rounded-[2.5rem] text-[10px] font-black uppercase tracking-[0.4em] shadow-2xl active:scale-[0.98]`}>LƯU THÔNG TIN KHÁCH HÀNG</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL SETTINGS & HISTORY GIỮ NGUYÊN */}
                    {isSettingsOpen && (
                        <div className="fixed inset-0 bg-black/98 z-[300] flex items-center justify-center p-6 backdrop-blur-sm animate-up">
                            <div className="bg-[#080808] w-full max-w-md rounded-[2.5rem] p-8 border border-white/10 relative">
                                <button onClick={() => setIsSettingsOpen(false)} className="absolute top-6 right-6 opacity-30 text-white"><i data-lucide="x"></i></button>
                                <h2 className="text-center font-luxury italic text-xl text-neon mb-6 font-bold">Quản lý truy cập</h2>
                                {!isAdminMode ? (
                                    <input type="password" placeholder="MÃ ADMIN..." className="w-full p-4 text-center text-white outline-none mb-4" onChange={(e) => {if(e.target.value===ADMIN_PASS) setIsAdminMode(true);}} />
                                ) : (
                                    <div className="space-y-4">
                                        <button onClick={() => {const email = prompt("Nhập Email:"); if(email && email.includes('@')) setAuthorizedEmails([...authorizedEmails, email.trim()]);}} className="w-full text-[9px] font-black text-pink-500 uppercase border border-pink-500/30 py-3 rounded-xl">+ THÊM NHÂN VIÊN</button>
                                        <div className="max-h-40 overflow-y-auto no-scrollbar space-y-2">
                                            {authorizedEmails.map((email, i) => (
                                                <div key={i} className="flex justify-between items-center bg-white/5 p-3 rounded-xl text-[10px] text-white/90">
                                                    {email} {email !== ADMIN_EMAIL_DEFAULT && <button onClick={() => setAuthorizedEmails(authorizedEmails.filter(e => e !== email))} className="text-red-500/50">XOÁ</button>}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {isHistoryOpen && (
                        <div className="fixed inset-0 bg-black/98 z-[200] flex items-center justify-center p-6 animate-up">
                            <div className="bg-[#080808] w-full max-w-md rounded-[2.5rem] p-8 border border-white/10 relative max-h-[85vh] flex flex-col">
                                <button onClick={() => setIsHistoryOpen(false)} className="absolute top-6 right-6 opacity-30 text-white"><i data-lucide="x"></i></button>
                                <h2 className="text-center font-luxury italic text-xl text-neon mb-6 font-bold">Lịch sử hệ thống</h2>
                                <div className="space-y-3 overflow-y-auto no-scrollbar flex-1">
                                    {logs.map((l) => (
                                        <div key={l.id} className="border-l border-pink-500/30 pl-4 py-2 bg-white/5 rounded-xl text-[10px] text-white/90">
                                            <p className="font-bold uppercase">{l.action}</p>
                                            <p className="text-[8px] text-pink-500/60">Bởi: {l.user}</p>
                                            <p className="text-[8px] opacity-30 mt-1">{l.time}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
